<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css for beginners </title>
    <style>
        a{
            color:rgba(11, 116, 54, 0.767);
        }
        h4{
            color:rgb(195, 0, 255);
        }
        .argentina{
            color:rgb(255, 0, 0);
        }

</head>
<body>
    <iframe width="560" height="315" referrerpolicy="strict-origin-when-cross-origin" src="https://www.youtube.com/embed/uVcVzDH4d1k?si=khVAqVbk4M34_ttl" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <p>This is a simple paragraph</p>

    <p style="color:brown;">This is a third paraghraph</p> -->
    <p id="red">This is a fourth paraghraph</p>
    <p class="argentina">This is a fourth paraghraph</p>
    <p>This is a fourth paraghraph</p>
    <p class="argentina">This is a fourth paraghraph</p>
    <a href="https://www.google.com">Visit Google</a>
    <a href="https://www.github.com">Visit GitHub</a>

    <h4>This is a subheading</h4>

</html>
